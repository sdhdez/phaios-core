name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo fmt
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy -- -D warnings

      - name: cargo test
        run: cargo test

      - name: cargo audit
        uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Version consistency check
        run: |
          CRATE=$(cargo metadata --no-deps --format-version=1 \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['packages'][0]['version'])")
          WHEEL=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$CRATE" != "$WHEEL" ]; then
            echo "Version mismatch: Cargo.toml=$CRATE, pyproject.toml=$WHEEL"
            exit 1
          fi
          echo "Version: $CRATE ✓"

      - name: Run all examples
        run: |
          for ex in 01_luminance 02_channel_mixer 03_color_filter \
                    04_zone_system 05_local_contrast 06_srgb_encode; do
            echo "--- $ex ---"
            cargo run --example $ex
          done

      - name: Set up uv + Python 3.12
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dev dependencies
        run: |
          uv venv .phaios-venv
          source .phaios-venv/bin/activate
          uv pip install -r requirements-dev.txt

      - name: Build Python extension
        run: |
          source .phaios-venv/bin/activate
          maturin develop

      - name: pytest
        run: |
          source .phaios-venv/bin/activate
          pytest tests/ffi.py -v
